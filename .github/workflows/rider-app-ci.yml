name: Rider App CI

on:
  push:
    branches: [main, develop]
    paths: ['apps/rider/**']
  pull_request:
    branches: [main, develop]
    paths: ['apps/rider/**']

concurrency:
  group: rider-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Analyze & Test Rider App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/rider

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        run: flutter test

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: analyze-and-test
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: apps/rider

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: delivra-rider-apk
          path: apps/rider/build/app/outputs/flutter-apk/*.apk
          retention-days: 30
