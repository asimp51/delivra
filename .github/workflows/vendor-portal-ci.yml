name: Vendor Portal CI

on:
  push:
    branches: [main, develop]
    paths: ['apps/vendor-portal/**']
  pull_request:
    branches: [main, develop]
    paths: ['apps/vendor-portal/**']

concurrency:
  group: vendor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Vendor Portal
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/vendor-portal

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/vendor-portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
