name: Admin Dashboard CI

on:
  push:
    branches: [main, develop]
    paths: ['apps/admin-dashboard/**']
  pull_request:
    branches: [main, develop]
    paths: ['apps/admin-dashboard/**']

concurrency:
  group: admin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Admin Dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin-dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/admin-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-dashboard-build
          path: apps/admin-dashboard/.next
          retention-days: 7
