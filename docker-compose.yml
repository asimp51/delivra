version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: delivra-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: delivra_db
      POSTGRES_USER: delivra
      POSTGRES_PASSWORD: delivra_secret
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: delivra-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: delivra-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@delivra.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - '5050:80'
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
