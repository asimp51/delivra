<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Delivra - My Orders</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8fafc;max-width:430px;margin:0 auto;min-height:100vh}
.header{background:#fff;padding:14px 16px;border-bottom:1px solid #e2e8f0}h1{font-size:20px;font-weight:700}
.content{padding:16px}
.section{font-size:14px;font-weight:700;color:#1e293b;margin-bottom:12px;margin-top:8px}
.order-card{background:#fff;border-radius:16px;border:1px solid #e2e8f0;padding:16px;margin-bottom:12px}
.order-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.order-id{font-weight:700;color:#059669;font-size:14px}
.status{padding:4px 10px;border-radius:99px;font-size:12px;font-weight:600}
.s-preparing{background:#fef3c7;color:#b45309}.s-delivered{background:#d1fae5;color:#059669}.s-cancelled{background:#fecaca;color:#dc2626}
.order-vendor{font-size:15px;font-weight:600;margin-bottom:4px}
.order-bottom{display:flex;justify-content:space-between;font-size:13px;color:#94a3b8}
.order-total{font-size:16px;font-weight:800;color:#059669}
.track-btn{display:flex;align-items:center;justify-content:center;gap:4px;margin-top:12px;padding:10px;background:#ecfdf5;border-radius:10px;color:#059669;font-weight:600;font-size:14px;cursor:pointer}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:1px solid #e2e8f0;display:flex;padding:8px 0}.nav-item{flex:1;text-align:center;padding:6px;font-size:10px;color:#94a3b8;font-weight:600}.nav-item.active{color:#059669}.nav-item .ico{font-size:22px;display:block;margin-bottom:2px}
</style>
</head>
<body>
<div class="header"><h1>My Orders</h1></div>
<div class="content">
<div class="section">Active Orders</div>
<div class="order-card">
<div class="order-top"><span class="order-id">DLV-K2M8</span><span class="status s-preparing">Preparing</span></div>
<div class="order-vendor">Al Baik</div>
<div class="order-bottom"><span>3 items</span><span class="order-total">$50.78</span></div>
<div class="track-btn">&#128205; Track Order</div>
</div>
<div class="section">Past Orders</div>
<div class="order-card">
<div class="order-top"><span class="order-id">DLV-J9F3</span><span class="status s-delivered">Delivered</span></div>
<div class="order-vendor">Pizza Hut</div>
<div class="order-bottom"><span>2 items - 2 hours ago</span><span class="order-total">$73.19</span></div>
</div>
<div class="order-card">
<div class="order-top"><span class="order-id">DLV-H4R1</span><span class="status s-delivered">Delivered</span></div>
<div class="order-vendor">Carrefour</div>
<div class="order-bottom"><span>8 items - Yesterday</span><span class="order-total">$137.90</span></div>
</div>
<div class="order-card">
<div class="order-top"><span class="order-id">DLV-F2N8</span><span class="status s-cancelled">Cancelled</span></div>
<div class="order-vendor">Flowers Plus</div>
<div class="order-bottom"><span>1 item - 5 days ago</span><span class="order-total">$94.50</span></div>
</div>
</div>
<div class="nav">
<div class="nav-item"><span class="ico">&#127968;</span>Home</div>
<div class="nav-item"><span class="ico">&#128269;</span>Search</div>
<div class="nav-item active"><span class="ico">&#128196;</span>Orders</div>
<div class="nav-item"><span class="ico">&#128722;</span>Cart</div>
<div class="nav-item"><span class="ico">&#128100;</span>Profile</div>
</div>
</body>
</html>
