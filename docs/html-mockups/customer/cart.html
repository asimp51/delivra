<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Delivra - Cart</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8fafc;max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:200px}
.header{background:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #e2e8f0}.back{width:36px;height:36px;background:#f1f5f9;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer}h1{font-size:18px;font-weight:700}
.vendor-bar{padding:12px 16px;background:#ecfdf5;display:flex;align-items:center;gap:8px;font-weight:700;color:#059669;font-size:14px}.vendor-bar span{margin-left:auto;font-size:13px}
.items{padding:16px}.cart-item{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid #f1f5f9}
.item-thumb{width:48px;height:48px;background:#f1f5f9;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#94a3b8;flex-shrink:0}
.item-detail{flex:1}.item-name{font-size:14px;font-weight:600}.item-opt{font-size:12px;color:#94a3b8}
.qty-ctrl{display:flex;align-items:center;border:1px solid #e2e8f0;border-radius:8px}.qty-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:#64748b}.qty-val{width:24px;text-align:center;font-weight:700;font-size:14px}
.item-total{font-weight:700;width:60px;text-align:right;font-size:14px}
.promo{padding:16px;display:flex;gap:8px}.promo input{flex:1;padding:10px 12px;border:1px solid #e2e8f0;border-radius:10px;font-size:14px}.promo button{padding:10px 20px;background:#059669;color:#fff;border:none;border-radius:10px;font-weight:600;font-size:14px;cursor:pointer}
.summary{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;padding:16px;box-shadow:0 -2px 10px rgba(0,0,0,.08)}.row{display:flex;justify-content:space-between;padding:4px 0;font-size:14px;color:#64748b}.row .val{font-weight:600;color:#1e293b}.total-row{display:flex;justify-content:space-between;padding:8px 0;font-size:16px;font-weight:800}.total-row .val{color:#059669;font-size:18px}
.checkout-btn{width:100%;padding:14px;background:#059669;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;margin-top:12px}
</style>
</head>
<body>
<div class="header"><div class="back">&#8592;</div><h1>Your Cart</h1></div>
<div class="vendor-bar">&#127979; Al Baik <span>25 min</span></div>
<div class="items">
<div class="cart-item"><div class="item-thumb">CM</div><div class="item-detail"><div class="item-name">Chicken Meal</div><div class="item-opt">Large, Spicy</div></div><div class="qty-ctrl"><div class="qty-btn">-</div><div class="qty-val">2</div><div class="qty-btn">+</div></div><div class="item-total">$36.00</div></div>
<div class="cart-item"><div class="item-thumb">GB</div><div class="item-detail"><div class="item-name">Garlic Bread</div></div><div class="qty-ctrl"><div class="qty-btn">-</div><div class="qty-val">1</div><div class="qty-btn">+</div></div><div class="item-total">$6.50</div></div>
<div class="cart-item"><div class="item-thumb">P1</div><div class="item-detail"><div class="item-name">Pepsi 1L</div></div><div class="qty-ctrl"><div class="qty-btn">-</div><div class="qty-val">1</div><div class="qty-btn">+</div></div><div class="item-total">$3.00</div></div>
</div>
<div class="promo"><input placeholder="Promo code"><button>Apply</button></div>
<div class="summary">
<div class="row"><span>Subtotal</span><span class="val">$45.50</span></div>
<div class="row"><span>Delivery Fee</span><span class="val">$3.00</span></div>
<div class="row"><span>Tax (5%)</span><span class="val">$2.28</span></div>
<div class="total-row"><span>Total</span><span class="val">$50.78</span></div>
<button class="checkout-btn">Proceed to Checkout</button>
</div>
</body>
</html>
