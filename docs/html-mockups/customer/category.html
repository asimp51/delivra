<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Delivra - Category</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8fafc;max-width:430px;margin:0 auto;min-height:100vh}
.header{background:#059669;color:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px}.header .back{width:36px;height:36px;background:rgba(255,255,255,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer}.header h1{font-size:18px;font-weight:700}
.subcats{display:flex;gap:8px;padding:12px 16px;overflow-x:auto}.subcats::-webkit-scrollbar{display:none}.subcat{padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;white-space:nowrap;border:1px solid #e2e8f0;background:#fff;color:#64748b;cursor:pointer}.subcat.active{background:#059669;color:#fff;border-color:#059669}
.vendors{padding:16px}.vendor-row{display:flex;gap:12px;background:#fff;border-radius:16px;margin-bottom:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}.vendor-img{width:100px;height:100px;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#94a3b8;flex-shrink:0}.vendor-info{padding:12px;flex:1}.vendor-name{font-size:15px;font-weight:700;color:#1e293b}.vendor-meta{font-size:12px;color:#94a3b8;display:flex;gap:8px;margin-top:4px}.star{color:#f59e0b;font-weight:600}.tag{background:#ecfdf5;color:#059669;font-size:11px;padding:2px 8px;border-radius:99px;font-weight:600;display:inline-block;margin-top:6px}
</style>
</head>
<body>
<div class="header"><div class="back">&#8592;</div><h1>Food & Dining</h1></div>
<div class="subcats">
<div class="subcat active">All</div><div class="subcat">Restaurants</div><div class="subcat">Fast Food</div><div class="subcat">Cafe</div><div class="subcat">Desserts</div><div class="subcat">Healthy</div><div class="subcat">Asian</div><div class="subcat">Pizza</div><div class="subcat">Burgers</div>
</div>
<div class="vendors">
<div class="vendor-row"><div class="vendor-img">AB</div><div class="vendor-info"><div class="vendor-name">Al Baik</div><div class="vendor-meta"><span class="star">&#9733; 4.8</span><span>25 min</span></div><div class="tag">Free delivery</div></div></div>
<div class="vendor-row"><div class="vendor-img">PH</div><div class="vendor-info"><div class="vendor-name">Pizza Hut</div><div class="vendor-meta"><span class="star">&#9733; 4.1</span><span>35 min</span></div><div class="tag">20% OFF</div></div></div>
<div class="vendor-row"><div class="vendor-img">HD</div><div class="vendor-info"><div class="vendor-name">Hardees</div><div class="vendor-meta"><span class="star">&#9733; 4.3</span><span>20 min</span></div><div class="tag">$2 delivery</div></div></div>
<div class="vendor-row"><div class="vendor-img">KF</div><div class="vendor-info"><div class="vendor-name">KFC</div><div class="vendor-meta"><span class="star">&#9733; 4.2</span><span>30 min</span></div><div class="tag">Free delivery</div></div></div>
<div class="vendor-row"><div class="vendor-img">SW</div><div class="vendor-info"><div class="vendor-name">Subway</div><div class="vendor-meta"><span class="star">&#9733; 4.0</span><span>25 min</span></div><div class="tag">$1 delivery</div></div></div>
<div class="vendor-row"><div class="vendor-img">SH</div><div class="vendor-info"><div class="vendor-name">Shawarma House</div><div class="vendor-meta"><span class="star">&#9733; 4.6</span><span>15 min</span></div><div class="tag">New</div></div></div>
</div>
</body>
</html>
